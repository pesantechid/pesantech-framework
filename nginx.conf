server {
    listen 80;
    server_name spidest.pesantech.web.id spidest.com;

    root /app/public;
    index index.php index.html index.htm;

    # 🚫 BLOCK SYSTEM PATH (FIX UTAMA)
    location ^~ /usr/ { deny all; }
    location ^~ /var/ { deny all; }
    location ^~ /etc/ { deny all; }
    location ^~ /bin/ { deny all; }
    location ^~ /lib/ { deny all; }

    # 🚫 BLOCK FILE SENSITIF
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
    }

    # 🚫 BLOCK PHP selain index.php
    location ~ \.php$ {
        return 404;
    }

    # ✅ HANYA IZINKAN index.php
    location = /index.php {
        fastcgi_pass php-app-spidest:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    error_log /var/log/nginx/spidest_error.log;
    access_log /var/log/nginx/spidest_access.log;
}
