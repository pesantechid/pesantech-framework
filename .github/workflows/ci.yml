name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, intl, bcmath, zip
          coverage: pcov

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Update .env for CI
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=password" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "APP_ENV=testing" >> .env
          echo "SKIP_DB_CHECK_IN_CI=true" >> .env
          echo "TELESCOPE_ENABLED=false" >> .env
          echo "PULSE_ENABLED=false" >> .env

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader --no-interaction

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Set Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Migrate (forward)
        run: php artisan migrate --force

      - name: Migrate rollback test
        run: |
          php artisan migrate:rollback --force
          php artisan migrate --force

      - name: Seed database
        run: php artisan db:seed --force

      - name: Pint (code style)
        run: composer pint

      - name: PHPStan (static analysis)
        run: composer phpstan

      - name: Rector dry-run
        run: ./vendor/bin/rector process --dry-run

      - name: Pest (unit + feature tests)
        run: composer pest

      - name: Composer audit
        run: composer audit --abandoned=report

      - name: Install NPM Dependencies
        run: npm ci

      - name: NPM lint
        run: npm run lint

      - name: Build Assets
        run: npm run build

      - name: NPM audit
        run: npm audit --audit-level=high
